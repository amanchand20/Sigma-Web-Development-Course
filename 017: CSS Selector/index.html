<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        .red{
            background-color: red;
        }

        #green{
            background-color: green;
        }

        div p{
            background-color: pink;
        }

        *{
            margin: 0;
            padding: 0;
        }

        a:visited{
            color: gold;
        }

        a:link{
            color: red;
        }

        a:active{
            background-color: blue;
        }

        a:hover{
            background-color: pink;
        }

        p:first-class{
            color: red;
        }

    </style>
</head>
<body>

    <div class="one">
        <p>
            d
        </p>
        <p>
            d
        </p>
    </div>

    <a href="https://www.google.com ">
        Go to google
    </a>

    <p>
        meow
    </p>

    <div>
        <span>
             <p>suiiiii</p>
        </span>
    </div>
    
    <div class="red">
        I'm a divison
    </div>

    <div id="green">
        bakai
    </div>

</body>
</html>
