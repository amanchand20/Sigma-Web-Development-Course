<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Properties</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box {
            border: 2px solid black;
            display: inline-block;
            width: 240px;
            padding: 45px;
            margin: 23px;
            /* display: none; */
            display: flex;
            justify-content: center;
        }

        .box1{
            /* display: none; */
            /* visibility: hidden; */
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    
    <div class="box box1">
        This is a box
    </div>

    <div class="box">
        This is an another box
    </div>

    <span>
        This is drawer 1
    </span>

    <span>
        This is drawer 2
    </span>

</body>

</html>
