<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadow and Outline</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 5px 15px 5px #888888;
        }

        .text-element {
            text-shadow: 5px 5px 10px #c61818;
            outline: 2px solid black;
            outline-offset: 10px;
            border: 2px solid black;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="box">
        I am a box
    </div>

    <p class="text-element">Lorem ipsum dolor sit amet consectetur adipisicing elit. Optio, iste, rerum ratione soluta
        labore quod sequi tenetur vitae porro accusamus itaque quo, velit ab. Ea praesentium sunt suscipit nesciunt
        perspiciatis commodi voluptatem!</p>

</body>

</html>
