<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .red{
            background-color: red;
        }  

        .red1{
            color: blue;
            padding: 10px;
            margin: 5px;
            border: 2px solid black;
            height: 20px;
            box-sizing:border-box;
        }

        .red2{
            color: yellow;
        }

    </style>
</head>
<body>

    <div class="red red1">
        I'm absolute
    </div>

    <div class="red red2">
        I'm absolute
    </div>

</body>
</html>
