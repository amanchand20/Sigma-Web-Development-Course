<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid black;
            margin: 55px;
            padding: 25px;
            border-radius: 8px;
            text-align: cen;
        }

        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .box1 {
            display: inline-block;
            border: 2px solid black;
            padding: 4px 10px;
            border-radius: 12px;
            margin: 5px;
        }

        h2 {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
            margin-bottom: 15px;
            margin-top: 15px;
        }

        .box2 {
            border: 2px;
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
            background-color: rgb(162, 229, 255);
            color: blue;
            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-size: 13px;
            font-style: normal;
        }

        .box23 {
            text-align: center;
            margin-top: 20px;

        }

    </style>
</head>

<body>
    <div class="box">

        <img src="https://images.unsplash.com/photo-1528543606781-2f6e6857f318?q=80&w=765&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="A man crossing the bridge">

        <span class="box1">Nature</span>
        <span class="box1">Lake</span>

        <h2>La pasión es una frase</h2>

        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Odio ratione, repudiandae cumque sint qui fuga
            reiciendis, Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eum, exercitationem. repellat cum
            beatae quod quasi expedita maiores aut.
        </p>

        <div class="box23">
            <span class="box2">Read More</span>
        </div>

    </div>
</body>

</html>
