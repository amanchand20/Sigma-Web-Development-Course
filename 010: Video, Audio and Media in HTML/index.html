<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video, Audio & Media in HTML</title>
</head>

<>

    <audio controls width="300" autoplay muted loop preload="metadata">

    <iframe src="https://www.youtube.com" width="400" height="400"></iframe>

</html>
