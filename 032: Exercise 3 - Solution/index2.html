<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f2f2f2;
        }

        .card {
            width: 320px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 15px;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .tags {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            border: 1px solid black;
            padding: 4px 10px;
            border-radius: 12px;
            margin-right: 5px;
            font-size: 12px;
        }

        h2 {
            margin: 12px 0;
            font-size: 18px;
        }

        p {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            border-radius: 12px;
            background-color: rgb(162, 229, 255);
            color: blue;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="https://images.unsplash.com/photo-1528543606781-2f6e6857f318?q=80&w=765&auto=format&fit=crop"
            alt="A man crossing the bridge">

        <div class="tags">
            <span class="tag">Nature</span>
            <span class="tag">Lake</span>
        </div>

        <h2>La pasión es una frase</h2>

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio ratione, repudiandae cumque sint qui fuga
            reiciendis, repellat cum beatae quod quasi expedita.
        </p>

        <div class="btn">Read More</div>

    </div>

</body>

</html>
